<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Transformations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="canvas-container"></div>

<div id="control-panel">
    <h2>3D Transformations</h2>

    <h3>Translation</h3>
    <label>X <input type="range" id="transX" min="-5" max="5" step="0.1"></label>
    <label>Y <input type="range" id="transY" min="-5" max="5" step="0.1"></label>
    <label>Z <input type="range" id="transZ" min="-5" max="5" step="0.1"></label>

    <h3>Rotation</h3>
    <label>X <input type="range" id="rotX" min="0" max="360"></label>
    <label>Y <input type="range" id="rotY" min="0" max="360"></label>
    <label>Z <input type="range" id="rotZ" min="0" max="360"></label>

    <h3>Scale</h3>
    <label>All <input type="range" id="scaleAll" min="0.1" max="3" step="0.1" value="1"></label>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module" src="app.js"></script>

</body>
</html>
